<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazenty - Programar Cita</title>
    <!-- Carga de estilos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.8.2/css/pikaday.min.css">
    <link rel="stylesheet" href="../css/programa_cita.css">
</head>
<body>
    <header>
        <a href="../index.html"><img src="../img/1688557351296.png" alt="Logotipo de Dazenty"></a>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../index.html#services">Servicios</a></li>
                <li><a href="../index.html#about">Conócenos</a></li>
                <li class="contact-wrapper"><a href="../index.html#contact">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>Formulario de Solicitud de Reunión</h1>
        <p>Selecciona una fecha y hora que te convenga</p>
        <form id="formulario-cita" action="#" method="POST">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" required>
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" required>
            <label for="fecha">Fecha de la cita:</label>
            <input type="text" id="fecha" name="fecha" required class="calendar">
            <label for="hora">Hora de la cita:</label>
            <input type="time" id="hora" name="hora" required>
            <button type="submit">Reservar cita</button>
        </form>
    </div>
    <footer>
        <nav>
            <a href="../index.html#services">Servicios</a>
            <a href="../index.html#contact">Contacto</a>
            <a href="programar_cita.html">Programar una cita</a>
        </nav>
        <div class="footer-logo">
            <p>&copy; 2024 Todos los derechos reservados.</p>
            <a href="https://www.instagram.com/dazen.ty" target="_blank">
                <img src="../img/instagram_logo_blanco.png" alt="Instagram">
            </a>
        </div>
    </footer>
    <!-- Carga de scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.8.2/pikaday.min.js"></script>
    <script>
        // Inicialización de Pikaday
        const picker = new Pikaday({
            field: document.getElementById('fecha'),
            format: 'YYYY-MM-DD',
            minDate: new Date(), // No permitir fechas anteriores a hoy
            onSelect: function(date) {
                console.log('Fecha seleccionada:', date);
            }
        });

        // Validación del formulario
        const formulario = document.getElementById('formulario-cita');
        formulario.addEventListener('submit', function(event) {
            event.preventDefault(); // Evita el envío automático
            alert('Cita reservada correctamente. ¡Gracias por contactarnos!');
        });
    </script>
</body>
</html>
